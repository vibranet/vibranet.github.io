<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibraNet™ - Open Community</title>
  <link rel="icon" type="image/x-icon" href="res/img/favicon.png">
  <style>
    body {
      background-color: #eeffff;
    }
    p, h1, h2 {
      font-family: Arial, sans-serif;
      margin: 0 0 8px 0;
    }
    h1 {
      color: #004040;
      text-shadow: 0 0 5px #008080;
    }
    p {
      color: #005555;
    }
    header {
      display: flex;
      right: 0;
      left: 0;
      top: 0;
      margin: 0;
      padding: 3px;
      align-items: center;
      min-height: 20px;
      background-color: #caf4ff;
      position: fixed;
      border-radius: 0 0 20px 20px;
    }
    .long-logo {
      display: none;
    }
    @media (orientation: landscape) or (min-width: 740px) {
      .long-logo {
        display: block;
      }
      .compact-logo {
        display: none;
      }
    }
    main {
      padding-top: 60px;
    }
    #hero h1 span {
      color: #0077aa;
      text-shadow: 0 0 5px #00cccc;
    }
    #hero {
      background-color: #caf4ff;
      border-radius: 20px;
      padding: 20px;
      margin: 5px;
    }
    @media (prefers-color-scheme: dark) {
      p {
        color: #caf4ff;
      }
      h1 {
        color: #4070aa;
      }
      header {
        background-color: #003050;
      }
      body {
        background-color: #002030;
      }
      #hero {
        background-color: #003050;
      }
      #hero h1 span {
        color: #00deef;
        text-shadow: 0 0 5px #00ffff;
      }
    }
</style>
</head>
<body>
  <header>
    <img id="logo1" src="res/img/logo1.png" class="long-logo" alt="VibraNet logo" style="width: 100px; height: auto;">

    <img id="logo2" src="res/img/logo2.png" class="compact-logo" alt="VibraNet logo" style="width: 45px; height: auto;">
  </header>
  <main>
    <section id="hero"><h1>Vibra<span>Net™</span> - open community</h1><p>The open source start-up project</p></section>
  </main>
</body>
</html>
